<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CareerPilot AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left,#7c3aed 0%,transparent 30%),
        radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
        #050816;

      display:flex;
      justify-content:center;
      align-items:flex-start;

      color:white;
      padding:20px;

      overflow-y:auto;
      overflow-x:hidden;
    }

    .bg-grid{
      position:fixed;
      inset:0;
      background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      z-index:0;
    }

    .floating{
      position:fixed;
      border-radius:50%;
      filter:blur(70px);
      opacity:0.35;
      animation:float 8s infinite ease-in-out alternate;
    }

    .f1{
      width:250px;
      height:250px;
      background:#7c3aed;
      top:-50px;
      left:-80px;
    }

    .f2{
      width:220px;
      height:220px;
      background:#06b6d4;
      bottom:-40px;
      right:-50px;
      animation-delay:2s;
    }

    @keyframes float{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(30px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      width:100%;
      max-width:500px;

      backdrop-filter:blur(20px);
      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.1);

      border-radius:28px;
      padding:40px;

      box-shadow:
      0 0 40px rgba(124,58,237,0.25),
      0 0 80px rgba(6,182,212,0.12);

      margin-top:20px;
      margin-bottom:20px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .logo-icon{
      width:50px;
      height:50px;
      border-radius:16px;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      box-shadow:0 0 20px rgba(124,58,237,0.5);
    }

    h1{
      font-size:2.5rem;
      font-weight:700;
      line-height:1.1;
    }

    .gradient{
      background:linear-gradient(90deg,#8b5cf6,#22d3ee);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      margin-top:15px;
      color:#cbd5e1;
      line-height:1.6;
      margin-bottom:30px;
    }

    .input-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
    }

    input{
      width:100%;
      padding:14px 16px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:15px;
      outline:none;
      transition:0.3s;
      border:1px solid transparent;
    }

    input:focus{
      border:1px solid #8b5cf6;
      box-shadow:0 0 15px rgba(139,92,246,0.35);
    }

    input::placeholder{
      color:#94a3b8;
    }

    button{
      width:100%;
      border:none;
      margin-top:10px;
      padding:15px;
      border-radius:16px;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px rgba(124,58,237,0.4);
    }

    button:hover{
      transform:translateY(-2px) scale(1.01);
      box-shadow:0 0 35px rgba(124,58,237,0.6);
    }

    .loading{
      margin-top:20px;
      text-align:center;
      color:#cbd5e1;
      display:none;
    }

    .result{
      margin-top:25px;
      padding:22px;
      border-radius:20px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      display:none;
      animation:fadeIn 0.5s ease;
      white-space:pre-line;
      line-height:1.8;
    }

    .result h2{
      margin-bottom:15px;
      font-size:22px;
    }

    .badge{
      display:inline-block;
      margin-top:16px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(34,211,238,0.15);
      color:#67e8f9;
      font-size:13px;
      border:1px solid rgba(34,211,238,0.3);
    }

    .footer{
      margin-top:30px;
      text-align:center;
      color:#64748b;
      font-size:13px;
    }

  </style>
</head>

<body>

<div class="bg-grid"></div>

<div class="floating f1"></div>
<div class="floating f2"></div>

<div class="container">

  <div class="logo">
    <div class="logo-icon">🚀</div>

    <div>
      <h1>CareerPilot <span class="gradient">AI</span></h1>
    </div>
  </div>

  <p class="subtitle">
    Discover your ideal future career path with futuristic AI-powered recommendations tailored to your passions, strengths, and academic profile.
  </p>

  <div class="input-group">
    <label>Interests</label>
    <input id="interests" placeholder="AI, Design, Robotics">
  </div>

  <div class="input-group">
    <label>Skills</label>
    <input id="skills" placeholder="Python, Creativity, Leadership">
  </div>

  <div class="input-group">
    <label>Grade</label>
    <input id="grade" placeholder="11">
  </div>

  <button onclick="generateCareer()">
    ✨ Generate AI Career Recommendation
  </button>

  <div class="loading" id="loading">
    🤖 AI is analyzing your future...
  </div>

  <div class="result" id="result">
    <h2>🎯 Recommended Career</h2>

    <p id="careerText"></p>

    <div class="badge">
      AI-Powered Prediction
    </div>
  </div>

  <div class="footer">
    Powered by CareerPilot AI • OpenAI • FastAPI
  </div>

</div>

<script>

async function generateCareer() {

  const loading =
    document.getElementById("loading");

  const result =
    document.getElementById("result");

  const careerText =
    document.getElementById("careerText");

  loading.style.display = "block";
  result.style.display = "none";

  const interests =
    document.getElementById("interests")
    .value
    .split(",");

  const skills =
    document.getElementById("skills")
    .value
    .split(",");

  const grade =
    parseInt(
      document.getElementById("grade").value
    );

  try {

    const response = await fetch(
      "https://careerpilot-backend-jfh7.onrender.com/career-recommendation",
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          interests,
          skills,
          grade
        })
      }
    );

    const data = await response.json();

    loading.style.display = "none";

    result.style.display = "block";

    careerText.innerText =
      data.recommendation;

  }

  catch(error){

    loading.style.display = "none";

    result.style.display = "block";

    careerText.innerHTML =
      "⚠️ Failed to connect to AI backend.";
  }

}

</script>

</body>
</html>
